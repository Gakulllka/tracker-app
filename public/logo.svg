<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="dg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <filter id="gs" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>
  <!-- Outer delta / triangle -->
  <polygon points="16,3 30.5,29 1.5,29" fill="url(#dg)"/>
  <!-- Inner hollow triangle -->
  <polygon points="16,11.5 25,27.5 7,27.5" fill="none" stroke="rgba(255,255,255,0.45)" stroke-width="1.4"/>
  <!-- Apex glow dot -->
  <circle cx="16" cy="3" r="2.2" fill="white" opacity="0.25"/>
</svg>
